name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ASOUND_PACKAGE=libasound2t64
          else
            ASOUND_PACKAGE=libasound2
          fi
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 "$ASOUND_PACKAGE" libgbm1

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            npm run dist -- --win zip nsis --publish never
          else
            npm run dist -- --linux zip --publish never
          fi

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs ${{ matrix.platform }}

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-${{ matrix.platform }}-x64
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-downloads
          sha256sum SuwolView-* > SHA256SUMS.txt

      - name: Write release notes
        run: |
          cp docs/release-notes-0.2.0.md release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-downloads/SuwolView-* release-downloads/SHA256SUMS.txt --clobber
          else
            gh release create "$TAG_NAME" release-downloads/SuwolView-* release-downloads/SHA256SUMS.txt \
              --title "SuwolView ${TAG_NAME#v}" \
              --notes-file release-notes.md
          fi
