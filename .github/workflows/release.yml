name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_tag: ${{ steps.meta.outputs.is_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v$VERSION"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_NAME="$GITHUB_REF_NAME"
            IS_TAG=true
            if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
              echo "::error::Release tag $TAG_NAME does not match package version $VERSION."
              exit 1
            fi
          else
            TAG_NAME="$EXPECTED_TAG"
            IS_TAG=false
          fi

          {
            echo "version=$VERSION"
            echo "tag_name=$TAG_NAME"
            echo "release_name=SuwolView ${TAG_NAME#v}"
            echo "is_tag=$IS_TAG"
          } >> "$GITHUB_OUTPUT"

  windows:
    name: Package (win)
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        run: npm run dist -- --win zip nsis --publish never

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs win

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-win-x64
          path: release-artifacts/*
          if-no-files-found: error

  linux:
    name: Package (linux)
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ASOUND_PACKAGE=libasound2t64
          else
            ASOUND_PACKAGE=libasound2
          fi
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2t64
          else
            FUSE_PACKAGE=libfuse2
          fi
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 "$ASOUND_PACKAGE" "$FUSE_PACKAGE" libgbm1

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        run: npm run dist -- --linux AppImage tar.gz --publish never

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs linux

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-linux-x64
          path: release-artifacts/*
          if-no-files-found: error

  publish-core-release:
    name: Publish core Release
    needs:
      - prepare
      - windows
      - linux
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.is_tag == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows and Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          merge-multiple: true

      - name: Create core checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-downloads
          find . -maxdepth 1 -type f \( \
            -name "SuwolView-*.AppImage" -o \
            -name "SuwolView-*.tar.gz" -o \
            -name "SuwolView-*.deb" -o \
            -name "SuwolView-*.rpm" -o \
            -name "SuwolView-*.zip" -o \
            -name "SuwolView-*.exe" -o \
            -name "latest*.yml" \
          \) -print0 | sort -z | xargs -0 -r sha256sum > checksums.txt
          test -s checksums.txt
          cat checksums.txt

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          umask 077
          test -n "${GPG_PRIVATE_KEY_B64:-}"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          GPG_KEY_FILE="$(mktemp "$RUNNER_TEMP/suwol-release-private-key.XXXXXX.asc")"
          trap 'rm -f -- "$GPG_KEY_FILE"' EXIT
          printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "$GPG_KEY_FILE"
          gpg --batch --import "$GPG_KEY_FILE"

      - name: Sign core checksums
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "${GPG_PASSPHRASE:-}"
          cd release-downloads
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign checksums.txt
          test -s checksums.txt.asc
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Verify core checksums
        env:
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -s suwol-release-public-key.asc
          gpg --import suwol-release-public-key.asc
          cd release-downloads
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Write release notes
        run: |
          RELEASE_NOTES="docs/release-notes-${GITHUB_REF_NAME#v}.md"
          test -s "$RELEASE_NOTES"
          cp "$RELEASE_NOTES" release-notes.md

      - name: Create or update core Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo suwol-suite/SuwolView >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-downloads/SuwolView-* release-downloads/latest*.yml release-downloads/checksums.txt release-downloads/checksums.txt.asc suwol-release-public-key.asc \
              --repo suwol-suite/SuwolView \
              --clobber
          else
            gh release create "$TAG_NAME" release-downloads/SuwolView-* release-downloads/latest*.yml release-downloads/checksums.txt release-downloads/checksums.txt.asc suwol-release-public-key.asc \
              --repo suwol-suite/SuwolView \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md
          fi

  macos:
    name: Package (mac arm64)
    needs:
      - prepare
      - publish-core-release
    runs-on: [self-hosted, macOS, ARM64]
    if: needs.prepare.outputs.is_tag == 'true'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Unlock macOS keychain
        shell: bash
        env:
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_KEYCHAIN_PASSWORD:-}" ]; then
            echo "MAC_KEYCHAIN_PASSWORD secret is missing."
            exit 1
          fi

          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"

          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" "$LOGIN_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$LOGIN_KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_KEYCHAIN_PASSWORD" "$LOGIN_KEYCHAIN"

          security default-keychain -s "$LOGIN_KEYCHAIN"
          security list-keychains -d user -s "$LOGIN_KEYCHAIN"

          echo "macOS login keychain unlocked for codesign/notarytool."

      - name: Check macOS signing and notary profile
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARYTOOL_PROFILE: suwol-notary-profile
        run: |
          set -euo pipefail
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_TEAM_ID NOTARYTOOL_PROFILE; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing macOS signing secret or notary profile setting: %s\n' "${missing[*]}"
            exit 1
          fi

          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep "Developer ID Application" || (
            echo "Developer ID Application identity not found" && exit 1
          )
          NOTARY_HISTORY="$(xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE")"
          printf '%s\n' "$NOTARY_HISTORY" | head -n 20
          xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" --output-format json >/dev/null
          echo "macOS signing secret and notarytool keychain profile check passed."

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- --mac dmg zip --arm64 --publish never

      - name: Notarize macOS DMG
        shell: bash
        env:
          NOTARYTOOL_PROFILE: suwol-notary-profile
          NOTARY_TIMEOUT_MINUTES: 120
        run: node scripts/notarize-dmg.mjs

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs mac

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Mark macOS ready
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p macos-ready
          printf 'macOS arm64 artifacts are notarized and ready for release attach.\n' > macos-ready/macos-ready.txt

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-mac-arm64
          path: release-artifacts/*
          if-no-files-found: error

      - name: Upload macOS ready marker
        uses: actions/upload-artifact@v4
        with:
          name: macos-ready
          path: macos-ready/macos-ready.txt
          if-no-files-found: error

  attach-macos-to-release:
    name: Attach macOS to Release
    needs:
      - prepare
      - publish-core-release
      - macos
    runs-on: ubuntu-latest
    if: always() && needs.prepare.outputs.is_tag == 'true' && needs.publish-core-release.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS ready marker
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: macos-ready
          path: macos-ready

      - name: Check macOS ready marker
        id: macos_ready
        shell: bash
        run: |
          set -euo pipefail
          if [ -f macos-ready/macos-ready.txt ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "macOS artifacts are not ready; core Windows/Linux Release remains published."
          fi

      - name: Download macOS artifacts
        if: steps.macos_ready.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: suwolview-mac-arm64
          path: macos-artifacts

      - name: Download existing Release assets
        if: steps.macos_ready.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release view "$TAG_NAME" --repo suwol-suite/SuwolView
          gh release download "$TAG_NAME" --repo suwol-suite/SuwolView --dir release-assets --clobber
          cp macos-artifacts/SuwolView-*-mac-arm64.dmg release-assets/
          cp macos-artifacts/SuwolView-*-mac-arm64.zip release-assets/
          cp macos-artifacts/latest-mac.yml release-assets/
          rm -f release-assets/checksums.txt release-assets/checksums.txt.asc

      - name: Regenerate complete checksums
        if: steps.macos_ready.outputs.ready == 'true'
        run: |
          set -euo pipefail
          cd release-assets
          find . -maxdepth 1 -type f \( \
            -name "SuwolView-*" -o \
            -name "latest*.yml" \
          \) -print0 | sort -z | xargs -0 -r sha256sum > checksums.txt
          test -s checksums.txt
          cat checksums.txt

      - name: Import GPG private key
        if: steps.macos_ready.outputs.ready == 'true'
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          umask 077
          test -n "${GPG_PRIVATE_KEY_B64:-}"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          GPG_KEY_FILE="$(mktemp "$RUNNER_TEMP/suwol-release-private-key.XXXXXX.asc")"
          trap 'rm -f -- "$GPG_KEY_FILE"' EXIT
          printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "$GPG_KEY_FILE"
          gpg --batch --import "$GPG_KEY_FILE"

      - name: Sign complete checksums
        if: steps.macos_ready.outputs.ready == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "${GPG_PASSPHRASE:-}"
          cd release-assets
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign checksums.txt
          test -s checksums.txt.asc
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Verify complete checksums
        if: steps.macos_ready.outputs.ready == 'true'
        env:
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -s release-assets/suwol-release-public-key.asc
          gpg --import release-assets/suwol-release-public-key.asc
          cd release-assets
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Upload macOS assets and refreshed checksums
        if: steps.macos_ready.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" \
            release-assets/SuwolView-*-mac-arm64.dmg \
            release-assets/SuwolView-*-mac-arm64.zip \
            release-assets/latest-mac.yml \
            release-assets/checksums.txt \
            release-assets/checksums.txt.asc \
            --repo suwol-suite/SuwolView \
            --clobber
