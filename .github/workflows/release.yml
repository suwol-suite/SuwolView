name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_suffix: x64
          - os: ubuntu-latest
            platform: linux
            artifact_suffix: x64
          - os: macos-14
            platform: mac
            artifact_suffix: universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Check macOS signing and notarization secrets
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          has_apple_id=false
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
            has_apple_id=true
          fi

          has_api_key=false
          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            has_api_key=true
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing macOS signing secrets: %s\n' "${missing[*]}"
            exit 1
          fi

          if [ "$has_apple_id" != "true" ] && [ "$has_api_key" != "true" ]; then
            echo "::error::Missing macOS notarization secrets. Provide APPLE_ID and APPLE_APP_SPECIFIC_PASSWORD, or APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER."
            exit 1
          fi

          echo "macOS signing and notarization secret presence check passed."

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ASOUND_PACKAGE=libasound2t64
          else
            ASOUND_PACKAGE=libasound2
          fi
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2t64
          else
            FUSE_PACKAGE=libfuse2
          fi
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 "$ASOUND_PACKAGE" "$FUSE_PACKAGE" libgbm1

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            npm run dist -- --win zip nsis --publish never
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            npm run dist -- --linux AppImage tar.gz --publish never
          else
            npm run dist -- --mac dmg zip --universal --publish never
          fi

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs ${{ matrix.platform }}

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-${{ matrix.platform }}-${{ matrix.artifact_suffix }}
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          merge-multiple: true

      - name: Create checksums
        run: |
          set -euo pipefail
          cd release-downloads
          find . -maxdepth 1 -type f \( \
            -name "SuwolView-*.AppImage" -o \
            -name "SuwolView-*.tar.gz" -o \
            -name "SuwolView-*.deb" -o \
            -name "SuwolView-*.rpm" -o \
            -name "SuwolView-*.dmg" -o \
            -name "SuwolView-*.zip" -o \
            -name "SuwolView-*.exe" -o \
            -name "latest*.yml" \
          \) -print0 | sort -z | xargs -0 -r sha256sum > checksums.txt
          test -s checksums.txt
          cat checksums.txt

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "$GPG_PRIVATE_KEY_B64"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/suwol-release-private-key.asc"
          gpg --batch --import "$RUNNER_TEMP/suwol-release-private-key.asc"
          rm -f "$RUNNER_TEMP/suwol-release-private-key.asc"

      - name: Sign checksums
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "$GPG_PASSPHRASE"
          cd release-downloads
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign checksums.txt
          test -s checksums.txt.asc

      - name: Verify GPG signature and checksums
        env:
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -s suwol-release-public-key.asc
          gpg --import suwol-release-public-key.asc
          cd release-downloads
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Write release notes
        run: |
          RELEASE_NOTES="docs/release-notes-${GITHUB_REF_NAME#v}.md"
          test -s "$RELEASE_NOTES"
          cp "$RELEASE_NOTES" release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-downloads/SuwolView-* release-downloads/latest*.yml release-downloads/checksums.txt release-downloads/checksums.txt.asc suwol-release-public-key.asc --clobber
          else
            gh release create "$TAG_NAME" release-downloads/SuwolView-* release-downloads/latest*.yml release-downloads/checksums.txt release-downloads/checksums.txt.asc suwol-release-public-key.asc \
              --title "SuwolView ${TAG_NAME#v}" \
              --notes-file release-notes.md
          fi
