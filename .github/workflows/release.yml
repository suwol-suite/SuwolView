name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package_win:
    name: Package (win)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        run: npm run dist -- --win zip nsis --publish never

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs win

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-win-x64
          path: release-artifacts/*
          if-no-files-found: error

  package_linux:
    name: Package (linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ASOUND_PACKAGE=libasound2t64
          else
            ASOUND_PACKAGE=libasound2
          fi
          if apt-cache show libfuse2t64 >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2t64
          else
            FUSE_PACKAGE=libfuse2
          fi
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 "$ASOUND_PACKAGE" "$FUSE_PACKAGE" libgbm1

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        run: npm run dist -- --linux AppImage tar.gz --publish never

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs linux

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-linux-x64
          path: release-artifacts/*
          if-no-files-found: error

  package_mac:
    name: Package (mac arm64)
    runs-on: [self-hosted, macOS, ARM64]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Check macOS signing and notary profile
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARYTOOL_PROFILE: suwol-notary-profile
        run: |
          set -euo pipefail
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_TEAM_ID NOTARYTOOL_PROFILE; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing macOS signing secret or notary profile setting: %s\n' "${missing[*]}"
            exit 1
          fi

          xcrun notarytool history --keychain-profile "$NOTARYTOOL_PROFILE" --output-format json >/dev/null
          echo "macOS signing secret and notarytool keychain profile check passed."

      - name: Install
        run: npm ci

      - name: Generate Icons
        run: npm run icons:generate

      - name: Verify
        run: npm run verify

      - name: Package
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run dist -- --mac dmg zip --arm64 --publish never

      - name: Notarize macOS DMG
        shell: bash
        env:
          NOTARYTOOL_PROFILE: suwol-notary-profile
        run: node scripts/notarize-dmg.mjs

      - name: Collect release artifact
        run: node scripts/collect-release-artifact.mjs mac

      - name: Package Smoke Test
        run: npm run package:smoke

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwolview-mac-arm64
          path: release-artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - package_win
      - package_linux
      - package_mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          merge-multiple: true

      - name: Create checksums
        run: |
          set -euo pipefail
          cd release-downloads
          find . -maxdepth 1 -type f \( \
            -name "SuwolView-*.AppImage" -o \
            -name "SuwolView-*.tar.gz" -o \
            -name "SuwolView-*.deb" -o \
            -name "SuwolView-*.rpm" -o \
            -name "SuwolView-*.dmg" -o \
            -name "SuwolView-*.zip" -o \
            -name "SuwolView-*.exe" -o \
            -name "latest*.yml" \
          \) -print0 | sort -z | xargs -0 -r sha256sum > checksums.txt
          test -s checksums.txt
          cat checksums.txt

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY_B64: ${{ secrets.GPG_PRIVATE_KEY_B64 }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "$GPG_PRIVATE_KEY_B64"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$GPG_PRIVATE_KEY_B64" | base64 --decode > "$RUNNER_TEMP/suwol-release-private-key.asc"
          gpg --batch --import "$RUNNER_TEMP/suwol-release-private-key.asc"
          rm -f "$RUNNER_TEMP/suwol-release-private-key.asc"

      - name: Sign checksums
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -n "$GPG_PASSPHRASE"
          cd release-downloads
          printf '%s' "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --detach-sign checksums.txt
          test -s checksums.txt.asc

      - name: Verify GPG signature and checksums
        env:
          GNUPGHOME: ${{ runner.temp }}/gnupg
        run: |
          set -euo pipefail
          test -s suwol-release-public-key.asc
          gpg --import suwol-release-public-key.asc
          cd release-downloads
          gpg --verify checksums.txt.asc checksums.txt
          sha256sum -c checksums.txt

      - name: Write release notes
        run: |
          RELEASE_NOTES="docs/release-notes-${GITHUB_REF_NAME#v}.md"
          test -s "$RELEASE_NOTES"
          cp "$RELEASE_NOTES" release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-downloads/SuwolView-* release-downloads/latest*.yml release-downloads/checksums.txt release-downloads/checksums.txt.asc suwol-release-public-key.asc --clobber
          else
            gh release create "$TAG_NAME" release-downloads/SuwolView-* release-downloads/latest*.yml release-downloads/checksums.txt release-downloads/checksums.txt.asc suwol-release-public-key.asc \
              --title "SuwolView ${TAG_NAME#v}" \
              --notes-file release-notes.md
          fi
